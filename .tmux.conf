set -g default-terminal 'tmux-256color'  # advertise modern color support to apps
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'  # enable truecolor and italics in compatible terminals
set -s escape-time 0  # remove the escape-key delay for faster Vim-style input
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # enable undercurl rendering for diagnostics
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # enable colored underlines for undercurl fallback

bind r source-file ~/.tmux.conf  # reload config without restarting tmux
set -g base-index 1  # start window numbers at 1 so labels match human counting
set -g pane-base-index 1  # start pane numbers at 1 for consistency with windows
unbind s  # replace the default session picker binding with a custom one
bind s choose-tree -sZ -O index -K '#{e|+:#{line},1}'  # open session tree with 1-based chooser labels

set -g status-style 'bg=#f6f8fa fg=#24292f'  # main bar colors tuned for GitHub Light
set -g status-left-style 'bg=#f6f8fa fg=#0969da'  # left side accent color for tmux branding/context
set -g status-right-style 'bg=#f6f8fa fg=#1a7f37'  # right side accent color to separate status info
set -g window-status-style 'bg=#f6f8fa fg=#57606a'  # inactive windows stay visible but subdued
set -g window-status-current-style 'bg=#eaeef2 fg=#24292f,bold'  # active window stands out more strongly
set -g window-style bg=default
set -g pane-border-style 'fg=#8c959f'  # pane splits use the same stronger GitHub border as Neovim/Ghostty
set -g pane-active-border-style 'fg=#0969da'  # active pane gets a GitHub blue accent
set -g message-style 'bg=#eaeef2 fg=#24292f'  # readable status messages on the light theme
set -g message-command-style 'bg=#ffffff fg=#0969da,bold'  # readable prefix-: command prompt

set-window-option -g mode-keys vi  # make copy mode use vi keys because it matches your editor habits
bind -T copy-mode-vi v send-keys -X begin-selection  # start selecting text with v, like Vim visual mode
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'  # copy to macOS clipboard with y

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'  # detect Vim/Neovim-like processes in the active pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"  # ignore stopped/dead panes and match the running editor process

bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'  # move left in Neovim splits or tmux panes
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'  # move down in Neovim splits or tmux panes
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'  # move up in Neovim splits or tmux panes
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'  # move right in Neovim splits or tmux panes
bind -T copy-mode-vi C-h select-pane -L  # keep Ctrl-h pane navigation available from copy mode
bind -T copy-mode-vi C-j select-pane -D  # keep Ctrl-j pane navigation available from copy mode
bind -T copy-mode-vi C-k select-pane -U  # keep Ctrl-k pane navigation available from copy mode
bind -T copy-mode-vi C-l select-pane -R  # keep Ctrl-l pane navigation available from copy mode

bind -r ^ last-window  # jump to the last window quickly, a common Vim-like shortcut
bind -r k select-pane -U  # move focus up using vim navigation
bind -r j select-pane -D  # move focus down using vim navigation
bind -r h select-pane -L  # move focus left using vim navigation
bind -r l select-pane -R  # move focus right using vim navigation
bind -r H resize-pane -L 5  # shrink pane width from the left by 5 cells
bind -r J resize-pane -D 5  # shrink pane height downward by 5 cells
bind -r K resize-pane -U 5  # grow pane height upward by 5 cells
bind -r L resize-pane -R 5  # grow pane width to the right by 5 cells
# bind m if -F '#{mouse}' 'set -g mouse off' 'set -g mouse on'  # toggle mouse mode for link clicks vs pane control, disabled since this overrides tmux marking key m

setw -g mouse on  # enable mouse support by default for resizing, selecting, and scrolling
set -g focus-events on # enable focus events to make nvim autoread work
