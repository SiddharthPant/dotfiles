# vim:fileencoding=utf-8:foldmethod=marker

font_size 13.0
cursor_shape block
shell_integration no-cursor
# cursor_text_color background
cursor_trail 3
enable_audio_bell no
enabled_layouts grid,stack,fat,horizontal,tall,vertical
map ctrl+enter toggle_layout stack

# BEGIN_KITTY_THEME
# Default
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family family="Maple Mono NF"
bold_font auto
italic_font auto
bold_italic_font auto
# END_KITTY_FONTS

background_opacity 0.85
background_blur 15
