"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """$directory$character"""
right_format = """$all"""
command_timeout = 3000

[directory]
truncation_length = 8
truncate_to_repo = false
style = "bold lavender"

[aws]
disabled = true

[gcloud]
disabled = true

[python]
format = '(via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style))'
python_binary = ['python']

[git_metrics]
disabled = false
